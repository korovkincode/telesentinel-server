name: TeleSentinel CI

on:
  push:
    branches: [ master]
  pull_request:
    branches: [ master ]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Poetry
        run: pipx install poetry

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'poetry'

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Lint with Ruff
        run: poetry run ruff check .

      - name: Check formatting with Ruff
        run: poetry run ruff format --check .

  tests:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Create .env file
        run: |
          touch .env
          
          echo IS_PROD=${{ secrets.IS_PROD }} >> .env
          
          echo SUPERUSER_LOGIN=${{ secrets.SUPERUSER_LOGIN }} >> .env
          echo SUPERUSER_PASSWORD=${{ secrets.SUPERUSER_PASSWORD }} >> .env
          
          echo DB_USER=${{ secrets.DB_USER }} >> .env
          echo DB_PASSWORD=${{ secrets.DB_PASSWORD }} >> .env
          echo DB_NAME=${{ secrets.DB_NAME }} >> .env
          
          echo SECRET_KEY=${{ secrets.SECRET_KEY }} >> .env
          echo JWT_ALGORITHM=${{ secrets.JWT_ALGORITHM }} >> .env
          
          echo ACCESS_TOKEN_EXPIRES_MINUTES=${{ secrets.ACCESS_TOKEN_EXPIRES_MINUTES }} >> .env
          echo REFRESH_TOKEN_EXPIRES_DAYS=${{ secrets.REFRESH_TOKEN_EXPIRES_DAYS }} >> .env
          echo REFRESH_TOKEN_COOKIE_NAME=${{ secrets.REFRESH_TOKEN_COOKIE_NAME }} >> .env
          
          echo OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} >> .env

      - name: Build and run tests
        run: |
          docker compose -f docker-compose.yml build
          docker compose up -d db api
          sleep 10 
          docker exec telesentinel-api pytest