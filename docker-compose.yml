version: "3.9"

services:
  db:
    image: postgres:18-alpine
    container_name: telesentinel-db
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ts-network

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: telesentinel-api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - ts-network

  nginx:
    image: nginx:stable-alpine
    container_name: telesentinel-proxy
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - ts-network

networks:
  ts-network:
    driver: bridge

volumes:
  postgres_data: